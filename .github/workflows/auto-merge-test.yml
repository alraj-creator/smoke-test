# .github/workflows/auto-merge-test.yml
name: Auto-merge test branches

on:
  push:
    branches:
      - '*test*'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            PR_URL=$(gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "Auto-merge: ${BRANCH}" \
              --body "Automated PR from test branch \`${BRANCH}\`.")
            echo "Created PR: $PR_URL"
          else
            echo "PR #${EXISTING_PR} already exists"
          fi

          gh pr merge --merge --auto "$BRANCH"
