# .github/workflows/auto-close.yml
name: Auto Close

on:
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  checks: read

jobs:
  close:
    if: >-
      github.event.check_suite.conclusion == 'failure' &&
      contains(github.event.check_suite.head_branch, 'test')
    runs-on: ubuntu-latest
    steps:
      - name: Find open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.check_suite.head_branch }}"
          PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number,state \
            --jq '.[0]')
          PR_NUMBER=$(echo "$PR" | jq -r '.number // empty')
          PR_STATE=$(echo "$PR" | jq -r '.state // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "state=$PR_STATE" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUMBER (state: $PR_STATE) for branch $BRANCH"

      - name: Close PR
        if: steps.pr.outputs.number && steps.pr.outputs.state == 'OPEN'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checks failed — closing PR #${{ steps.pr.outputs.number }}"
          gh pr close ${{ steps.pr.outputs.number }} \
            --repo "${{ github.repository }}" \
            --comment "Check suite failed. Closing automatically."
